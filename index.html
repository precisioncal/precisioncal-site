<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrecisionCal LLC</title>

<style>
:root{
  --blue:#0b4f8a;
  --dark:#061f38;
  --gold:#d6a536;
  --light:#f5f9ff;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:var(--light);overflow-x:hidden}

body::before{
  content:"";
  position:fixed;
  width:400px;height:400px;
  background:rgba(214,165,54,.2);
  filter:blur(60px);
  animation:float 8s infinite alternate;
  z-index:-1;
}
@keyframes float{
  from{transform:translate(-100px,-50px)}
  to{transform:translate(200px,200px)}
}

header{
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px 20px;
  position:sticky;
  top:0;
  z-index:10;
}

nav{
  display:flex;
  gap:18px;
}

nav a{
  font-weight:bold;
  color:#0b4f8a;
  text-decoration:none;
}

.hero{
  background:linear-gradient(135deg,#07345c,#0b4f8a);
  color:white;
  padding:60px 20px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}
