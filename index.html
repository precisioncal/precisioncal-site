<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrecisionCal LLC | Calibration, Repair & Maintenance</title>
  <meta name="description" content="PrecisionCal LLC provides fast, traceable calibration, repair, and maintenance for gas detection and air monitoring equipment." />
  <style>
    :root {
      --blue: #0b4f8a;
      --blue-dark: #07345c;
      --blue-light: #e9f4ff;
      --gold: #d6a536;
      --text: #1f2937;
      --muted: #5f6b7a;
      --white: #ffffff;
      --gray: #f5f7fa;
      --border: #d9e2ec;
      --shadow: 0 18px 40px rgba(7, 52, 92, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
    }

    .top-bar {
      background: var(--blue-dark);
      color: var(--white);
      font-size: 0.92rem;
      padding: 9px 0;
    }

    .top-bar .container {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      color: var(--blue-dark);
      letter-spacing: 0.2px;
    }

    .brand-logo {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      object-fit: contain;
      background: var(--white);
      border: 1px solid var(--border);
      padding: 5px;
    }

    .brand-text span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--blue-dark);
      font-weight: 700;
      font-size: 0.94rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 12px 20px;
      background: var(--gold);
      color: #1f1600;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(214, 165, 54, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(214, 165, 54, 0.35);
    }

    .btn.secondary {
      background: var(--white);
      color: var(--blue-dark);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at top left, #2477b9 0, var(--blue) 36%, var(--blue-dark) 100%);
      color: var(--white);
      padding: 74px 0 58px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -90px -160px auto;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 48px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #ffe7a4;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2.4rem, 5vw, 4.7rem);
      line-height: 1.02;
      margin-bottom: 20px;
      max-width: 760px;
    }

    .hero p {
      font-size: 1.15rem;
      color: #e5eff9;
      max-width: 650px;
      margin-bottom: 28px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .trust-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      max-width: 720px;
    }

    .trust-item {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 14px;
      border-radius: 16px;
      font-weight: 800;
    }

    .trust-item span {
      display: block;
      font-size: 0.86rem;
      color: #d7e7f8;
      font-weight: 600;
    }

    .hero-card {
      background: var(--white);
      color: var(--text);
      border-radius: 28px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .hero-photo {
      border-radius: 22px;
      width: 100%;
      max-height: 520px;
      object-fit: cover;
      object-position: center;
      background: var(--blue-light);
    }

    .service-strip {
      margin-top: -28px;
      position: relative;
      z-index: 5;
    }

    .service-strip .container {
      background: var(--white);
      border-radius: 22px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .strip-item {
      padding: 22px;
      border-right: 1px solid var(--border);
    }

    .strip-item:last-child {
      border-right: none;
    }

    .strip-item strong {
      display: block;
      color: var(--blue-dark);
      margin-bottom: 5px;
      font-size: 1.03rem;
    }

    .strip-item p {
      color: var(--muted);
      font-size: 0.92rem;
    }

      padding: 72px 0;
